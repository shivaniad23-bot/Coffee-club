                        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Club - Kitchen Dashboard</title>
    <style>
        :root {
            --primary: #5c3d2e;
            --dark: #2d1b11;
            --light: #f4ece1;
            --green: #2e7d32;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        header h1 {
            margin: 0;
            color: var(--primary);
        }
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .order-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-top: 6px solid var(--primary);
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
        .items-list {
            list-style: none;
            padding: 0;
            margin: 0 0 15px 0;
            flex-grow: 1;
        }
        .items-list li {
            padding: 5px 0;
            font-size: 1.05rem;
        }
        .items-list li span {
            font-weight: bold;
            color: var(--primary);
        }
        .btn-complete {
            background-color: var(--green);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>🍳 Kitchen Order Board</h1>
        <span style="font-weight: bold; color: var(--green);">● LIVE</span>
    </header>

    <div class="orders-grid" id="orders-container">
        <!-- Incoming Orders Appear Here Dynamically -->
    </div>

    <!-- Firebase Connection Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ⚠️ USE THE EXACT SAME FIREBASE CONFIG AS INDEX.HTML
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const ordersContainer = document.getElementById('orders-container');

        onValue(ref(db, 'orders'), (snapshot) => {
            ordersContainer.innerHTML = '';
            const data = snapshot.val();

            if (!data) {
                ordersContainer.innerHTML = '<p style="font-size: 1.2rem; color: #666;">No pending orders.</p>';
                return;
            }

            Object.keys(data).forEach(key => {
                const order = data[key];
                
                const card = document.createElement('div');
                card.className = 'order-card';

                let itemsHTML = '';
                order.items.forEach(i => {
                    itemsHTML += `<li><span>${i.quantity}x</span> ${i.item}</li>`;
                });

                card.innerHTML = `
                    <div>
                        <div class="order-header">
                            <span>Order #${order.orderNum || 'N/A'}</span>
                            <span>Table: ${order.table}</span>
                        </div>
                        <ul class="items-list">
                            ${itemsHTML}
                        </ul>
                    </div>
                    <button class="btn-complete" data-key="${key}">Done / Serve</button>
                `;

                ordersContainer.appendChild(card);
            });

            document.querySelectorAll('.btn-complete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const orderKey = e.target.getAttribute('data-key');
                    remove(ref(db, `orders/${orderKey}`));
                });
            });
        });
    </script>
</body>
</html>
