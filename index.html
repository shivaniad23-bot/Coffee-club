                                    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Club - Order Online</title>
    <style>
        :root {
            --primary: #5c3d2e;
            --secondary: #e8ded2;
            --dark: #2d1b11;
            --light: #fdfaf6;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        header h1 {
            color: var(--primary);
            margin: 5px 0;
        }
        .menu-container {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f0e6df;
        }
        .menu-item:last-child {
            border-bottom: none;
        }
        .item-details h3 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
        }
        .item-details p {
            margin: 0;
            color: var(--primary);
            font-weight: bold;
        }
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn-qty {
            background-color: var(--secondary);
            border: none;
            color: var(--dark);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qty-display {
            font-size: 1.1rem;
            font-weight: bold;
            min-width: 20px;
            text-align: center;
        }
        .table-input-section {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .table-input-section label {
            font-weight: bold;
            font-size: 0.9rem;
        }
        .table-input-section input {
            padding: 12px;
            border: 1px solid var(--secondary);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }
        .order-summary {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px dashed var(--secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .btn-submit {
            display: block;
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>☕ Coffee Club</h1>
        <p>Scan. Order. Enjoy.</p>
    </header>

    <div class="menu-container">
        <!-- Interactive Menu Items -->
        <div class="menu-item" data-name="Espresso" data-price="120">
            <div class="item-details">
                <h3>Espresso</h3>
                <p>₹120</p>
            </div>
            <div class="quantity-controls">
                <button class="btn-qty decrement">-</button>
                <span class="qty-display">0</span>
                <button class="btn-qty increment">+</button>
            </div>
        </div>

        <div class="menu-item" data-name="Cappuccino" data-price="180">
            <div class="item-details">
                <h3>Cappuccino</h3>
                <p>₹180</p>
            </div>
            <div class="quantity-controls">
                <button class="btn-qty decrement">-</button>
                <span class="qty-display">0</span>
                <button class="btn-qty increment">+</button>
            </div>
        </div>

        <div class="menu-item" data-name="Butter Croissant" data-price="150">
            <div class="item-details">
                <h3>Butter Croissant</h3>
                <p>₹150</p>
            </div>
            <div class="quantity-controls">
                <button class="btn-qty decrement">-</button>
                <span class="qty-display">0</span>
                <button class="btn-qty increment">+</button>
            </div>
        </div>

        <div class="table-input-section">
            <label for="table-num">Your Table Number:</label>
            <input type="number" id="table-num" placeholder="e.g. 5" min="1">
        </div>

        <div class="order-summary">
            <span>Total Amount:</span>
            <span id="total-price">₹0</span>
        </div>

        <button class="btn-submit" id="btn-order">Send Order to Kitchen</button>
    </div>

    <!-- Firebase Connection Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ⚠️ REPLACE THIS WITH YOUR FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const menuItems = document.querySelectorAll('.menu-item');
        const totalPriceDisplay = document.getElementById('total-price');

        menuItems.forEach(item => {
            const incrementBtn = item.querySelector('.increment');
            const decrementBtn = item.querySelector('.decrement');
            const qtyDisplay = item.querySelector('.qty-display');

            incrementBtn.addEventListener('click', () => {
                let qty = parseInt(qtyDisplay.textContent);
                qtyDisplay.textContent = qty + 1;
                updateTotal();
            });

            decrementBtn.addEventListener('click', () => {
                let qty = parseInt(qtyDisplay.textContent);
                if (qty > 0) {
                    qtyDisplay.textContent = qty - 1;
                    updateTotal();
                }
            });
        });

        function updateTotal() {
            let grandTotal = 0;
            menuItems.forEach(item => {
                const qty = parseInt(item.querySelector('.qty-display').textContent);
                const price = parseFloat(item.getAttribute('data-price'));
                grandTotal += qty * price;
            });
            totalPriceDisplay.textContent = '₹' + grandTotal;
        }

        document.getElementById('btn-order').addEventListener('click', () => {
            const tableNumber = document.getElementById('table-num').value;
            if (!tableNumber) {
                alert('Please enter your table number!');
                return;
            }

            let orderedItems = [];
            let total = 0;

            menuItems.forEach(item => {
                const qty = parseInt(item.querySelector('.qty-display').textContent);
                if (qty > 0) {
                    const name = item.getAttribute('data-name');
                    const price = parseFloat(item.getAttribute('data-price'));
                    orderedItems.push({ item: name, quantity: qty });
                    total += qty * price;
                }
            });

            if (orderedItems.length === 0) {
                alert('Please select at least one item!');
                return;
            }

            // Increments order counting safely from 1
            const counterRef = ref(db, 'lastOrderNum');
            runTransaction(counterRef, (currentValue) => {
                return (currentValue || 0) + 1;
            }).then((transactionResult) => {
                const nextOrderNumber = transactionResult.snapshot.val();

                const orderData = {
                    orderNum: nextOrderNumber,
                    table: tableNumber,
                    items: orderedItems,
                    total: total,
                    status: "Pending",
                    timestamp: Date.now()
                };

                push(ref(db, 'orders'), orderData)
                    .then(() => {
                        alert(`Order #${nextOrderNumber} sent to Kitchen!`);
                        document.querySelectorAll('.qty-display').forEach(disp => disp.textContent = '0');
                        document.getElementById('table-num').value = '';
                        updateTotal();
                    })
                    .catch((err) => alert("Database Error: " + err.message));
            });
        });
    </script>
</body>
</html>
